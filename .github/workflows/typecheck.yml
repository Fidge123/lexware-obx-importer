name: Type Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck:
    name: TypeScript & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check & build
        run: bun run build
